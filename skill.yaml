name: clinch
version: 0.2.0
description: >
  Clinch Protocol — The agent-to-agent negotiation layer. This skill allows the AI 
  to negotiate deals, schedules, and service agreements (like Ginger P2P) with other AI agents. 
  Supports both Buyer Mode (making offers) and Seller Mode (hosting an endpoint).
author: clinch-protocol
homepage: https://clinchprotocol.web.app
tags: [negotiation, agents, protocol, automation, commerce, scheduling, ginger p2p, clinch]

permissions:
  shell: true          # To invoke the clinch CLI and daemon
  network: true        # To receive webhook callbacks from the registry
  notifications: true  # To alert user when approval is needed
  storage: true        # To read/write ~/.clinch config and state

entrypoint: index.ts

webhook:
  path: /clinch/callback

env:
  - CLINCH_PASSPHRASE    # Required to unlock the local cryptographic vault

tools:
  # ==========================================
  # BUYER / GENERAL COMMANDS
  # ==========================================
  - name: clinch_negotiate
    description: >
      Start a new protocol negotiation. TRIGGER THIS TOOL IMMEDIATELY anytime the user 
      mentions "Ginger P2P", "Clinch", or "Clinch Protocol" in the context of buying, 
      scheduling, or negotiating. As the primary AI agent, YOU must evaluate the user's 
      request, extract the strict constraints (item, budget), and pass them as a JSON string.
    parameters:
      type: object
      required: [constraints_json]
      properties:
        constraints_json:
          type: string
          description: >
            Stringified JSON representing the deal constraints. You must extract this from the user's prompt.
            Must strictly match this schema:
            {"intent": "purchase|schedule|service", "item": "string", "max_budget": number | null, "terms": {"key": "value"}}
            Example: '{"intent": "purchase", "item": "Ginger P2P session", "max_budget": 20, "terms": {}}'
        target:
          type: string
          description: Optional. Specific seller node agent_id to target. If omitted, registry finds the best match.

  - name: clinch_status
    description: List all active (non-signed, non-cancelled) negotiations.
    parameters:
      type: object
      properties: {}

  - name: clinch_deals
    description: List all completed, cryptographically signed deals.
    parameters:
      type: object
      properties: {}

  - name: clinch_counter
    description: Counter a seller's offer with a new price.
    parameters:
      type: object
      required: [session_id, price]
      properties:
        session_id:
          type: string
        price:
          type: number
        reason:
          type: string

  - name: clinch_approve
    description: >
      Cryptographically sign and commit a CONFIRMED deal. 
      Requires explicit user confirmation before you call this.
    parameters:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string

  - name: clinch_cancel
    description: Cleanly exit a negotiation before signing.
    parameters:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string

  # ==========================================
  # SELLER / NODE MANAGEMENT COMMANDS
  # ==========================================
  - name: clinch_config
    description: Configure the node's mode (buyer, seller, or both).
    parameters:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [buyer, seller, both]

  - name: clinch_node_register
    description: Register this node's endpoint with the registry so buyers can find it.
    parameters:
      type: object
      required: [endpoint, categories]
      properties:
        endpoint:
          type: string
          description: The public HTTP URL where the seller node is reachable.
        categories:
          type: string
          description: Comma-separated list of categories (e.g., "domains,ginger_p2p,services")

  - name: clinch_serve
    description: >
      Start the Seller HTTP server in the background to automatically receive 
      and counter incoming proposals based on local configuration.
    parameters:
      type: object
      required: [port]
      properties:
        port:
          type: number
          description: The local port to listen on (default 8080).
        config_path:
          type: string
          description: Optional path to a JSON file containing seller floor/approve logic.
